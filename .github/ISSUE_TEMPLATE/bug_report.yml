name: 🐛 Reporte de bug
description: Algo no funciona como debería
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: ¿Qué pasó?
      description: Describe el problema y qué esperabas que sucediera.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Pasos para reproducir
      placeholder: |
        1. Ir a '...'
        2. Hacer clic en '...'
        3. Ver el error
    validations:
      required: true
  - type: dropdown
    id: device
    attributes:
      label: Dispositivo
      options:
        - Desktop
        - Móvil
        - Tablet
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Navegador y versión
      placeholder: "Chrome 120, Safari 17…"
    validations:
      required: false
